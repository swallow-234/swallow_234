<ul>
<li><a href="#A1">2023-07-04_《休閒日常》_蚊子</a>[散文]</li>
</ul><hr class="a000">
<!--內容-->
    <h1 id="A1">內容</h1><hr class="a001">
    <P class="aaa zzz">
    嗡~嗡~嗡~是誰在半夜咆哮<br>
    嗡~嗡~嗡~是誰的皮在養了<br>
    <br>
    啪~啪~啪~是誰情緒高漲著<br>
    啪~啪~啪~是誰在電漿爆香<br>
    <br>
    唰~唰~唰~是誰在鏟紅豆冰<br>
    唰~唰~唰~是誰颳起了大風<br>
    <br>
    哈~哈~哈~終於逮到蚊子了<br>
    嗡~嗡~嗡~聽說有人在找我<br>
    <br>
    啊~啊~啊~怎麼還有蚊子啊<br>
    吸~吸~吸~新鮮美味又好喝<br>
    </p>
