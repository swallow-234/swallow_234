<li><a>名稱：聖光教教主</a></li>
<li><a>代表色：白</a></li>
<li><a>鮮紅色的瞳孔</a></li>

<P>
簡介：<br>
大多時間都在自我修行、而時常給人一種散發光芒的錯覺，但實際上並沒有。<br>
[凝結時空、靜如止水、空靈境界、閃躍瞬間、聖軍兵臨、移動要塞]<br>
