<ul>
    <li><a href="#A1">2024-06-13_《遺跡先遣隊》_風與草</a>[小說]</li>
</ul><hr class="a000">
<!--內容-->
<h1 id="A1">故事內容</h1><hr class="a001">
<p>
遺跡先遣隊－探險員<a class="aaa">阿呆</a>：<br>
－在遺跡中發現意義不明的文本<br>
－代號：<a class="ccc">風與草</a><br>
－時間可追朔至名為[國中]時期的文代。<br>
</p>
<P class="xxx zzz fff">
風與草<br>
風牽引著草<br>
草...死命反抗<br>
風化為颶風"怒吼"著<br>
草以虛弱的身軀"反抗"<br>
<br>
風平靜...淡然著悲傷~<br>
離去...<br>
草回到原位...像"沒事"一樣平靜...<br>
風不時在草的周遭盤旋...<br>
草依然不動。<br>
</P>
